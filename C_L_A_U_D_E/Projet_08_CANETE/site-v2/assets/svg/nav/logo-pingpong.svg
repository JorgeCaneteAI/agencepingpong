    <ellipse cx="16" cy="16" rx="11" ry="10" fill="#E63946"/>
    <rect x="13" y="26" width="6" height="14" rx="2.5" fill="#1A1F3A"/>
  </g>
  <!-- Right racket (turquoise, rotated +20deg around its center) -->
  <g transform="rotate(20, 32, 22)">
    <ellipse cx="32" cy="16" rx="11" ry="10" fill="#2ABFBF"/>
    <rect x="29" y="26" width="6" height="14" rx="2.5" fill="#1A1F3A"/>
  </g>
  <!-- White ball on top center -->
  <circle cx="24" cy="14" r="5" fill="#FFFFFF" stroke="#1A1F3A" stroke-width="1"/>
  <path d="M24 9 C22 11, 22 17, 24 19" stroke="#D0C8C0" stroke-width="0.5" fill="none"/>
</svg>
